<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Box Model Usage Task One</title>
    <style>
        section{
            width: 980px;
            height: 500px;
            border: 2px dashed black;
        }
        section>div {
            width: 200px;
            height: 50px;
            border: 2px solid black;
            margin-top: 13px;
        }

        section>div:nth-child(2){
            margin-left: 80px;
        }
        section>div:nth-child(3){
            margin-left: 175px;
        }

        section>div:nth-child(4){
            margin-left: 310px;
        }

        section>div:nth-child(5){
            margin-left: 440px;
        }

        section>img:nth-child(6){
            margin-left: 644px;
            width: 320px;
            margin-top: -217px;
        }

        section>img:nth-child(7){
            margin-left: 644px;
            width: 320px;
            margin-top: -110px;
        }
    </style>
</head>
<body>
<section>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <img src="assets/img/sc.gif" alt="">
    <img src="assets/img/giphy.gif" alt="">

</section>



</body>
</html>
