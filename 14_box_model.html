<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Box Model</title>
    <style>
        div>p {
               width: 300px;
                height: 3px;
                background: darkgrey;
                color: white;


                border-top: 20px solid gold;
                border-bottom: 20px solid lightskyblue;
                border-left: 20px solid deeppink;
                border-right: 20px solid chartreuse;

                padding: 20px ;

        }

        div>p:nth-child(2){
        margin-left: 40px;

            /*box model implementation*/

            /*Define the border of the element*/
            /*border: 10px solid black;*/
            border-top: 20px solid yellow;
            border-bottom: 20px solid green;
            border-left: 40px solid deeppink;
            border-right: 40px solid magenta;

            /*place spaces between content area and border area*/
            /*padding: 20px;*/

            /*padding-top: 40px;*/
            /*padding-right: 50px;*/
            /*padding-left: 60px;*/
            /*padding-bottom: 60px;*/
            padding: 10px 20px 40px 50px;

            /*define spaces out of the element*/
            /*this can be used to manage outer space of an element*/
            /*margin: 40px;*/

            /*margin-top: 40px;*/
            /*margin-bottom: 70px;*/
            /*margin-left: 50px;*/
            /*margin-right: 30px;*/

            margin: 10px 30px 50px 50px;

        }
        div>p:nth-child(3){
        margin-left: 60px;
        }
        div>p:nth-child(4){
        margin-left: 80px;
        }
        div>p:nth-child(5){
        margin-left: 100px;
        }
        img{
             /*position: fixed;*/
             margin-left:500px;
             /*margin-top: auto;*/
             /*top: 300px;*/
            margin-top: -500px;
         }

    </style>
</head>
<body>
<div>
    <p >Box Model</p>
    <p>Box Model</p>
    <p >Box Model</p>
    <p >Box Model</p>
    <p >Box Model</p>
    <aside><img src="assets/img/human.png" alt="human" height="200"></aside>
</div>


<ul>
    <li>List One</li>
    <li>List Two</li>
    <li>List Three</li>
</ul>
</body>
</html>
