<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Cascade</title>
    <style>
        :first-child{
            color: aqua;
        }

        *{
            color: red;
        }

        h1{
            color: green;
        }

        .mainHeader{
            color: deeppink;
        }

        #mainHeader{
            color: orange;
        }

        [id]{
            color: blueviolet;
        }

    </style>
</head>
<body>
<h1 id="mainHeader" style="color: brown" class="mainHeader">What is Cascade.?</h1>
