<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Percentage Units</title>
    <style>
        section {
            width: 800px;
            height: 400px;
            border: 2px solid black;
        }

        section>div{
            border: 2px solid red;
            /*get the parent with and
            calculate 50% from it
            800/2 = 400px(computed value) */
            width: 50%;
            height: 50%;
        }

    </style>
</head>
<body>
<section>
    <div></div>
    <div></div>
</section>
</body>
</html>
