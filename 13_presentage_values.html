<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Percentage Units</title>
    <style>
        section {
            width: 800px;
            height: 400px;
            border: 2px solid black;
        }

        section>div{
            border: 2px solid red;
            /*Using with relative lengths*/
            /*get the parent with and
            calculate 50% from it
            800/2 = 400px(computed value) */
            width: 50%;
            height: 50%;
        }

        section>div:nth-child(1){
            background: url("assets/img/image.png");
            background-size: cover;
            background-position: center;
            /*filter: saturate(1.2) blur(2px);*/
        }
        section>div:nth-child(2){
            background: url("assets/img/cat.png");
            background-size: cover;
            background-position: center;
        }

    </style>
</head>
<body>
<section>
    <div></div>
    <div></div>
</section>
</body>
</html>
